# ============================================
# DARKSHIELD - Application Configuration
# ============================================

# Server Configuration
server.port=9091

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=darkshield_db

# JWT Configuration
darkshield.jwt.secret=DarkShieldCyberThreatIntelligencePlatformSecretKeyForJWTTokenGeneration2024SecureKey
darkshield.jwt.access-token-expiration=900000
darkshield.jwt.refresh-token-expiration=604800000

# Groq AI Configuration (fallback key if env var not set)
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
darkshield.upload.dir=uploads/avatars

# Logging
logging.level.com.darkshield=DEBUG
logging.level.org.springframework.security=WARN

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null
