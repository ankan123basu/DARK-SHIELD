# ============================================
# DARKSHIELD - Application Configuration
# ============================================

# Server Configuration
server.port=9091

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=darkshield_db

# JWT Configuration
darkshield.jwt.secret=DarkShieldCyberThreatIntelligencePlatformSecretKeyForJWTTokenGeneration2024SecureKey
darkshield.jwt.access-token-expiration=900000
darkshield.jwt.refresh-token-expiration=604800000

# Logging
logging.level.com.darkshield=DEBUG
logging.level.org.springframework.security=DEBUG

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null
